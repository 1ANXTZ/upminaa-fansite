<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found | Upminaa Fan Hub</title>
<meta name="description" content="This page doesn't exist — but the UpMinaa Fan Hub does." />
<link rel="icon" type="image/png" href="upminaa-profile.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .error-page{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6vw;
  }
  .error-code{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(4rem, 18vw, 10rem);
    line-height: 1;
    background: linear-gradient(135deg, var(--purple-light), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none;
    margin-bottom: 10px;
  }
  .error-title{
    font-family: var(--font-display);
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: #fff;
    margin-bottom: 16px;
  }
  .error-desc{
    color: var(--text-dim);
    font-size: 1.05rem;
    max-width: 460px;
    margin-bottom: 34px;
  }
</style>
</head>
<body>

<div class="bg-fx" aria-hidden="true">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="grid-overlay"></div>
</div>

<div class="error-page">
  <p class="error-code">404</p>
  <h1 class="error-title">Looks like this stream went offline.</h1>
  <p class="error-desc">
    The page you're looking for doesn't exist — but the rest of the UpMinaa Fan Hub is very much live.
  </p>
  <a href="/upminaa-fansite/" class="btn btn-glow btn-twitch">
    <span class="btn-icon">◀</span> Back to the Fan Hub
  </a>
</div>

</body>
</html>
